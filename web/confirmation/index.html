<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed - BasePro</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="icon" type="image/png" href="../assets/logo_icon.png">
</head>

<body>
    <!-- Preloader to prevent FOUT -->
    <div id="preloader">
        <img class="logo-icon preloader-logo" src="/assets/logo_icon.png" alt="TRADIE">
    </div>
    <header>
        <div class="nav-container">
            <a href="../" class="logo">
                <img class="logo-icon" src="/assets/logo_icon.png" alt="TRADIE">
                BasePro
            </a>
        </div>
    </header>

    <main class="auth-container">
        <div class="hero-glow"></div>
        <div class="glass-panel auth-card" id="main-card">
            <!-- Loading State -->
            <div id="verifying" style="text-align: center; padding: 2rem;">
                <span class="spinner" style="width: 24px; height: 24px; margin-bottom: 1.5rem;"></span>
                <h2>Verifying...</h2>
            </div>

            <!-- Success State -->
            <div id="result-success" style="display: none; text-align: center;">
                <div class="feature-icon"
                    style="margin: 0 auto 1.5rem; background: rgba(52, 211, 153, 0.1); color: #34d399;">✓</div>
                <h2 class="gradient-text" style="font-size: 2rem;">Verified!</h2>
                <p style="margin: 1.5rem 0 2.5rem; color: var(--text-secondary);">Your account is now activated. Tap
                    below to launch the app and get started.</p>
                <div id="actions">
                    <a href="clearbuild://" class="btn-primary" style="display: block; margin-bottom: 1rem;">Open
                        BasePro App</a>
                    <div class="footer-links" style="margin-top: 2rem; justify-content: center;">
                        <a href="../">Return to Home</a>
                    </div>
                </div>
            </div>

            <!-- Failure State -->
            <div id="result-error" style="display: none; text-align: center;">
                <div class="feature-icon"
                    style="margin: 0 auto 1.5rem; background: rgba(251, 113, 133, 0.1); color: #fb7185;">✕</div>
                <h2 style="font-size: 2rem; color: #fb7185;">Verification Failed</h2>
                <p id="error-text" style="margin: 1.5rem 0 2.5rem; color: var(--text-secondary);">This verification link
                    is invalid, expired, or has already been used.</p>
                <div id="error-actions">
                    <a href="../" class="btn-secondary" style="display: block; margin-bottom: 1rem;">Return to
                        Homepage</a>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">Need help? Contact <a
                            href="mailto:support@calibremedia.com"
                            style="color: var(--accent-blue); text-decoration: none;">Support</a></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const verifying = document.getElementById('verifying');
        const successState = document.getElementById('result-success');
        const errorState = document.getElementById('result-error');
        const errorText = document.getElementById('error-text');

        async function check() {
            try {
                const { data: { session }, error } = await supabase.auth.getSession();

                verifying.style.display = 'none';

                if (session) {
                    successState.style.display = 'block';
                } else {
                    errorState.style.display = 'block';
                    if (error) {
                        errorText.textContent = error.message;
                    }
                }
            } catch (err) {
                verifying.style.display = 'none';
                errorState.style.display = 'block';
                errorText.textContent = "An unexpected error occurred. Please try again from the app.";
            }
        }

        // Run check on load
        check();

        // Listen for auth state changes (Supabase captures hash automatically)
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' || session) {
                verifying.style.display = 'none';
                errorState.style.display = 'none';
                successState.style.display = 'block';
            }
        });
    </script>
    <script>
        // Preloader Logic - minimum 1500ms display
        const preloaderStart = Date.now();
        const preloader = document.getElementById("preloader");
        window.addEventListener("load", () => {
            const elapsed = Date.now() - preloaderStart;
            const remaining = Math.max(0, 1500 - elapsed);
            setTimeout(() => {
                if (preloader) preloader.classList.add("preloader-hidden");
            }, remaining);
        });
    </script>
</body>

</html>
