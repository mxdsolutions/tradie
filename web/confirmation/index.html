<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed - BasePro</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <header>
        <div class="nav-container">
            <a href="../" class="logo">
                <div class="logo-icon">B</div>
                BasePro
            </a>
        </div>
    </header>

    <main class="auth-container">
        <div class="hero-glow"></div>
        <div class="glass-panel auth-card" id="main-card">
            <div id="verifying" style="text-align: center; padding: 2rem;">
                <span class="spinner" style="width: 24px; height: 24px; margin-bottom: 1.5rem;"></span>
                <h2>Verifying...</h2>
            </div>

            <div id="result" style="display: none; text-align: center;">
                <h2 id="result-title" class="gradient-text" style="font-size: 2rem;">Verification Success</h2>
                <p id="result-text" style="margin: 1.5rem 0 2.5rem; color: var(--text-secondary);"></p>
                <div id="actions">
                    <a href="clearbuild://" class="btn-primary" style="display: block; margin-bottom: 1rem;">Open
                        BasePro App</a>
                    <div class="footer-links" style="margin-top: 2rem; justify-content: center;">
                        <a href="../">Return to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://erfvdiqeslllqqqebjat.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyZnZkaXFlc2xsbHFxcWViamF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5ODg0NzYsImV4cCI6MjA4NjU2NDQ3Nn0.7GRtLZ2-ZVcSwcNxTC_F-2Y2qMqqA2YUJ9eZvapSTM4';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const verifying = document.getElementById('verifying');
        const result = document.getElementById('result');
        const resTitle = document.getElementById('result-title');
        const resText = document.getElementById('result-text');

        async function check() {
            const { data: { session }, error } = await supabase.auth.getSession();
            verifying.style.display = 'none';
            result.style.display = 'block';

            if (session) {
                resTitle.textContent = "Verified!";
                resText.textContent = "Your account is now activated. Tap below to launch the app and get started.";
            } else if (error) {
                resTitle.textContent = "Error";
                resTitle.style.background = 'none';
                resTitle.style.color = '#fb7185';
                resText.textContent = error.message;
            } else {
                resTitle.textContent = "Link Expired";
                resTitle.style.background = 'none';
                resTitle.style.color = '#fb7185';
                resText.textContent = "This verification link is no longer valid. Please check your app to resend.";
            }
        }

        check();
        supabase.auth.onAuthStateChange((event) => {
            if (event === 'SIGNED_IN') check();
        });
    </script>
</body>

</html>
