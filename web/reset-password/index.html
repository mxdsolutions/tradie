<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - BasePro</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="../assets/logo_icon.png">
</head>

<body>
    <!-- Preloader to prevent FOUT -->
    <div id="preloader">
        <img class="logo-icon preloader-logo" src="/assets/logo_icon.png" alt="TRADIE">
    </div>
    <header>
        <div class="nav-container">
            <a href="../" class="logo">
                <img class="logo-icon" src="/assets/logo_icon.png" alt="TRADIE">
                BasePro
            </a>
        </div>
    </header>

    <main class="auth-container">
        <div class="hero-glow"></div>
        <div class="glass-panel auth-card">
            <h2 id="title" style="margin-bottom: 2rem;">Reset Password</h2>

            <div id="loading" class="form-group" style="text-align: center;">
                <span class="spinner"></span> <span id="loading-text"
                    style="color: var(--text-secondary); margin-left: 0.5rem;">Initializing...</span>
            </div>

            <div id="status-message" style="margin-bottom: 1.5rem; font-size: 0.95rem; display: none;"></div>

            <form id="reset-form" style="display: none;">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Update Password</button>
            </form>

            <div id="footer-links" class="footer-links" style="margin-top: 2rem; display: none;">
                <a href="../">Return to Home</a>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://erfvdiqeslllqqqebjat.supabase.co';
        const supabaseKey = 'sb_publishable_Jmj6eJxzWXO0pjJ84jU6bQ_qmu4DpH5';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey, {
            auth: {
                detectSessionInUrl: true,
                flowType: 'pkce',
            }
        });

        const form = document.getElementById('reset-form');
        const loading = document.getElementById('loading');
        const statusMsg = document.getElementById('status-message');
        const footerLinks = document.getElementById('footer-links');

        async function init() {
            const { data: { session }, error } = await supabase.auth.getSession();
            loading.style.display = 'none';

            if (error || !session) {
                const hash = window.location.hash;
                if (!hash || !hash.includes('type=recovery')) {
                    showStatus('Link invalid or expired. Please request a new one.', 'error');
                    footerLinks.style.display = 'flex';
                    return;
                }
            }
            form.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (pass !== confirmPass) {
                showStatus('Passwords do not match', 'error');
                return;
            }

            form.style.display = 'none';
            loading.style.display = 'block';
            document.getElementById('loading-text').textContent = 'Updating...';

            const { error } = await supabase.auth.updateUser({ password: pass });
            loading.style.display = 'none';

            if (error) {
                showStatus(error.message, 'error');
                form.style.display = 'block';
            } else {
                showStatus('Password updated successfully! You can now sign in to the app.', 'success');
                footerLinks.style.display = 'flex';
                await supabase.auth.signOut();
            }
        });

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.style.display = 'block';
            statusMsg.style.color = type === 'error' ? '#fb7185' : '#34d399';
        }

        init();
    </script>
    <script>
        // Preloader Logic - minimum 1500ms display
        const preloaderStart = Date.now();
        const preloader = document.getElementById("preloader");
        window.addEventListener("load", () => {
            const elapsed = Date.now() - preloaderStart;
            const remaining = Math.max(0, 1500 - elapsed);
            setTimeout(() => {
                if (preloader) preloader.classList.add("preloader-hidden");
            }, remaining);
        });
    </script>
</body>

</html>
