<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - BasePro</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <main class="auth-container">
        <div class="hero-glow"></div>
        <div class="glass-panel auth-card">
            <div class="logo-icon" style="margin: 0 auto 1.5rem;">B</div>
            <h2 id="title">Reset Password</h2>

            <div id="loading" class="form-group" style="text-align: center;">
                <span class="spinner"></span> <span id="loading-text"
                    style="color: var(--text-secondary); margin-left: 0.5rem;">Initializing...</span>
            </div>

            <div id="status-message" style="margin-bottom: 1.5rem; font-size: 0.95rem; display: none;"></div>

            <form id="reset-form" style="display: none;">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6">
                </div>
                <a href="../" class="logo">
                    <div class="logo-icon">B</div>
                    BasePro
                </a>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Update Password</button>
            </form>

            <div class="footer-links" style="margin-top: 2rem;">
                <a href="../">Home</a>
                <a href="../privacy/">Privacy</a>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://erfvdiqeslllqqqebjat.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyZnZkaXFlc2xsbHFxcWViamF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5ODg0NzYsImV4cCI6MjA4NjU2NDQ3Nn0.7GRtLZ2-ZVcSwcNxTC_F-2Y2qMqqA2YUJ9eZvapSTM4';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('reset-form');
        const loading = document.getElementById('loading');
        const statusMsg = document.getElementById('status-message');
        const backLink = document.getElementById('back-link');

        async function init() {
            const { data: { session }, error } = await supabase.auth.getSession();
            loading.style.display = 'none';

            if (error || !session) {
                const hash = window.location.hash;
                if (!hash || !hash.includes('type=recovery')) {
                    showStatus('Link invalid or expired. Please request a new one.', 'error');
                    backLink.style.display = 'block';
                    return;
                }
            }
            form.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (pass !== confirmPass) {
                showStatus('Passwords do not match', 'error');
                return;
            }

            form.style.display = 'none';
            loading.style.display = 'block';
            document.getElementById('loading-text').textContent = 'Updating...';

            const { error } = await supabase.auth.updateUser({ password: pass });
            loading.style.display = 'none';

            if (error) {
                showStatus(error.message, 'error');
                form.style.display = 'block';
            } else {
                showStatus('Password updated successfully! You can now sign in to the app.', 'success');
                backLink.style.display = 'block';
                await supabase.auth.signOut();
            }
        });

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.style.display = 'block';
            statusMsg.style.color = type === 'error' ? '#fb7185' : '#34d399';
        }

        init();
    </script>
</body>

</html>
